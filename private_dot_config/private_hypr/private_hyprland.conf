# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

# Default
$scriptsDir = $HOME/.config/hypr/scripts
$configs = $HOME/.config/hypr/configs
$UserConfigs = $HOME/.config/hypr/UserConfigs

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitorv2 {
  output = desc:Lenovo Group Limited D24-20 UR6060LH
  mode = 1920x1080@74.97
  position = 0x0
  scale = 1
}

monitor = desc:LG Electronics LG TV SSCR2 0x01010101, preferred, -1920x0, 2, bitdepth, 10

monitorv2 {
  output = desc:Samsung Electric Company SAMSUNG
  mode = preferred
  position = -1920x0
  scale = 1
}

#monitor = ,preferred,auto,1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = app2unit -- ghostty +new-window
$fileManager = app2unit -- thunar
# $menu = wofi --show drun
$menu = killall rofi || rofi -show drun -theme ~/.config/rofi/global/rofi.rasi -run-command "uwsm-app -- {cmd}"
$steambig = MANGOHUD=0 uwsm-app -- gamescope -f -m 1 -w 3840 -h 2160 -W 3840 -H 2160 -e -- steam-native -gamepadui
$albert = echo -n '["toggle"]' | nc -U ~/.cache/albert/ipc_socket
$vicinae = vicinae toggle

$uwsm_cmd = "app2unit"

$lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend # fuck nvidia

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
# exec-once = nm-applet &

# exec-once = firefox

# exec-once = gBar bar 0

# exec-once = wl-clipboard-history -t
#exec-once = uwsm-app -s a -- /usr/lib/polkit-kde-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent

exec-once = systemctl --user start waybar.service
exec-once = systemctl --user start xsettingsd.service

#exec-once = dbus-update-activation-environment --systemd --all

# exec-once = hyprpaper
exec-once = $uwsm_cmd -s b -- waypaper --restore

# exec-once = dunst

# Notification Daemon
exec-once = $uwsm_cmd -s b -- swaync

#exec-once = $uwsm_cmd -s b -- hyprpm reload -n

exec-once = $uwsm_cmd -- qpwgraph

exec-once = $uwsm_cmd -- albert

# exec-once = hypridle

exec-once = $uwsm_cmd -s b -- wl-paste --watch clipvault store --database /tmp/db --max-entry-length 0

exec-once = $uwsm_cmd -s a -- thunar --daemon
exec-once = $uwsm_cmd -s b -- udiskie

# exec-once = sunshine

# exec-once = $uwsm_cmd -s b -- clight

#exec-once = $HOME/.bin/autostart.sh

# exec-once = sleep 3 && dex -w -a -e Hyprland
#exec-once = sleep 3 && systemctl --user start autostart.target

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
#source = $UserConfigs/ENVariables.conf # Environment variables to load

# Dark Theme
#env = gtk-application-prefer-dark-theme,true
#env = GTK_THEME,Arc:dark
#env = GTK2_RC_FILES,/usr/share/themes/Arc-Darker/gtk-2.0/gtkrc
#env = QT_STYLE_OVERRIDE,Arc-Darker

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)


    # halloween
    #col.active_border = rgb(F97316)
    #col.inactive_border = rgb(3B1C2F)
    
    # Christmas
    #col.active_border = rgb(3c8d0d)
    #col.inactive_border = rgb(E40A2D)


    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 0.96
    inactive_opacity = 0.8

    shadow {
      enabled = true
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        new_optimizations = on
        ignore_opacity = true
        xray = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#master {
#    new_is_master = true
#}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    focus_on_activate = true
}

render {
  direct_scanout = 2
  #new_render_scheduling = true
}

debug {
  disable_logs = true
}

ecosystem {
  no_donation_nag = true
  enforce_permissions = true
}

#############
### INPUT ###
#############

cursor {
  default_monitor = desc:Lenovo Group Limited D24-20 UR6060LH
}

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fi
    kb_variant = nodeadkeys
    kb_model = pc105
    kb_options =
    kb_rules = evdev

    repeat_delay = 300
    repeat_rate = 30

    accel_profile = flat
    follow_mouse = 1
    numlock_by_default = true
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


source = $UserConfigs/UserKeybinds.conf # Put your own keybinds here


# Permissions
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow

permission = .*, screencopy, allow
permission = /opt/brave-bin/.*, screencopy, ask


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .* # You'll probably like this.
}


windowrule {
  name = windowrule-2
  workspace = 2 silent
  match:class = (firefox)
  match:title = (.*)(Mozilla Firefox)(.*)$
}

windowrule {
  name = windowrule-3
  workspace = 2 silent
  match:class = (Brave-browser)
}


windowrule {
  name = windowrule-4
  tag = +media
  match:class = (Celluloid)
  match:title = (.*)(Celluloid)(.*)$
}


windowrule {
  name = windowrule-5
  border_color = rgb(FFFF00)
  match:title = ^(.*Hyprland.*)$ # set bordercolor to yellow when title contains Hyprland
}


windowrule {
  name = windowrule-6
  border_color = rgb()
  match:class = (.*ghostty)
}


windowrule {
  name = windowrule-7
  border_color = rgb(FF0000)
  immediate = yes
  content = game
  match:tag = game
}


windowrule {
  name = windowrule-8
  float = on
  match:class = (org.keepassxc.KeePassXC)
  match:title = (.*)(Luo salasana)(.*)$
}


windowrule {
  name = windowrule-9
  opacity = 1.0 override
  match:class = brave-browser
}

windowrule {
  name = windowrule-10
  border_color = rgb(FF0000)
  match:class = brave-browser
  match:title = .*- [yY]ou[tT]ube.*- Brave
}

windowrule {
  name = windowrule-11
  opacity = 1.0 override
  match:class = virt-manager
}


windowrule {
  name = windowrule-12
  workspace = 3 silent
  match:class = steam
}

windowrule {
  name = windowrule-13
  workspace = 4 silent
  match:class = vesktop
}

# shimeji
windowrule {
  name = windowrule-14
  float = on
  no_blur = on
  no_focus = on
  no_shadow = on
  border_size = 0
  match:class = com-group_finity-mascot-Main
}


# Workspace
workspace = name:tv, monitor:desc:LG Electronics LG TV SSCR2 0x01010101, default:true


windowrule {
  name = windowrule-15
  monitor = 1
  match:class = (gamescope)
  match:title = (.*)(Steam)(.*)$
}


windowrule {
  name = Counter-Strike
  tag = +game
  match:class = ^(cs2)$
}

windowrule {
  name = Minecraft
  tag = +game
  opacity = 1.0 override
  immediate = no
  match:title = (Minecraft*)(.*)$
}

windowrule {
  name = Steam-games
  tag = +game
  match:class = ^(steam_app_\d+)$
}

windowrule {
  name = Goat Simulator 3
  tag = +game
  immediate = no
  match:class = steam_app_850190
}

windowrule {
  name = BeamNG
  tag = +game
  match:class = BeamNG.drive.x64
}

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

